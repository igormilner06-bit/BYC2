<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Game</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.container { padding:15px; }
.card { background:#fff; padding:15px; margin-bottom:10px; border-radius:12px; }
button { padding:10px; margin:5px 0; width:100%; background:#4CAF50; color:white; border:none; border-radius:8px; cursor:pointer; }
button:hover { background:#45a049; }
</style>
</head>

<body>
<div class="container">

<h2>🏙️ City Game</h2>

<div class="card">
  💰 Деньги: <span id="money"></span><br>
  👥 Люди: <span id="people"></span><br>
  😊 Счастье: <span id="happy"></span>
</div>

<button onclick="build()">🏠 Построить дом</button>

</div>

<script>
  // ===== Telegram (не обязателен, но если есть — используем) =====
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  // ===== Уникальный ID пользователя для localStorage =====
  function getUserId() {
    if (tg?.initDataUnsafe?.user?.id) {
      return "tg_" + tg.initDataUnsafe.user.id;
    }
    // fallback: свой ключ, общий для всех (или можно случайный)
    return "city_game_default_user";
  }

  const userId = getUserId();
  const STORAGE_KEY = "cityGame_" + userId;

  // ===== Игровые данные по умолчанию =====
  let game = {
    money: 500,
    people: 0,
    happiness: 50
  };

  // ===== Загрузка из localStorage =====
  function loadGame() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        // обновляем только те поля, которые есть в сохранёнке
        game = { ...game, ...parsed };
        console.log("Данные загружены из устройства", game);
      } catch(e) {
        console.warn("Ошибка парсинга сохранения", e);
      }
    } else {
      console.log("Нет сохранений — старт с дефолтом");
    }
    updateUI(); // показать сразу загруженное
  }

  // ===== Сохранение в localStorage =====
  function saveGame() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(game));
    console.log("Сохранено на устройстве", game);
  }

  // ===== Обновить экран и запланировать сохранение =====
  let saveTimeout;
  function updateUI() {
    document.getElementById("money").innerText = game.money;
    document.getElementById("people").innerText = game.people;
    document.getElementById("happy").innerText = game.happiness;

    // сохраняем, но не чаще раза в секунду
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => saveGame(), 1000);
  }

  // ===== Действия игрока =====
  window.build = function build() {
    if (game.money >= 100) {
      game.money -= 100;
      game.people += 10;
      game.happiness = Math.min(100, game.happiness + 2);
      updateUI();
    } else {
      alert("Не хватает денег!");
    }
  };

  // ===== Авто-доход каждые 3 секунды =====
  setInterval(() => {
    if (game.people > 0) {
      game.money += game.people * 2;
      updateUI();
    }
  }, 3000);

  // ===== Старт игры =====
  loadGame();
</script>

</body>
</html>
