<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Game</title>

<style>
body { font-family: Arial; margin: 0; background:#eef2f7; }
.container { padding: 15px; }
.card { background:#fff; padding:15px; margin-bottom:10px; border-radius:12px; }
.stat { display:flex; justify-content:space-between; margin:5px 0; }
button { padding:10px; border:none; border-radius:8px; cursor:pointer; }
</style>
</head>

<body>
<div class="container">

<h2>🏙️ City Game</h2>

<div class="card">
  <div class="stat">💰 <span id="money"></span></div>
  <div class="stat">👥 <span id="people"></span></div>
  <div class="stat">😊 <span id="happy"></span></div>
  <div class="stat">📈 <span id="income"></span></div>
  <div class="stat">🏆 <span id="level"></span></div>
</div>

<button onclick="buildHouse()">🏠 Дом (100)</button>
<button onclick="buildFactory()">🏭 Завод (300)</button>
<button onclick="buildSchool()">🏫 Школа (200)</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDiESFdpgCfwaHPbn5DVvde82bmTUn_92A",
  authDomain: "game-124da.firebaseapp.com",
  projectId: "game-124da",
  storageBucket: "game-124da.firebasestorage.app",
  messagingSenderId: "323957265964",
  appId: "1:323957265964:web:2ef3e6dbaea06b0c12e389"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Telegram
const tg = window.Telegram?.WebApp;

tg?.ready?.();   // ВАЖНО
alert(JSON.stringify(window.Telegram?.WebApp?.initDataUnsafe));
let userId = "test";

if (tg?.initDataUnsafe?.user?.id) {
    userId = "tg_" + tg.initDataUnsafe.user.id;
}
console.log("TG INIT DATA:", tg?.initDataUnsafe);
console.log("USER ID:", userId);

// GAME
let game = {
    money: 500,
    people: 0,
    happiness: 50,
    level: 1
};

// LOAD
async function loadGame() {
    const ref = doc(db, "cities", userId);
    const snap = await getDoc(ref);

    if (snap.exists()) {
        game = snap.data();
    }

    update();
}

// SAVE
async function saveGame() {
    try {
        const ref = doc(db, "cities", userId);
        await setDoc(ref, game);
    } catch (e) {
        console.log("SAVE ERROR:", e);
    }
}

// DEBOUNCE SAVE (ВАЖНО)
let saveTimeout;
function scheduleSave() {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
        saveGame();
    }, 1000);
}

// ECONOMY
function income() {
    return game.people * 2;
}

// UI
function update() {
    document.getElementById("money").innerText = game.money;
    document.getElementById("people").innerText = game.people;
    document.getElementById("happy").innerText = game.happiness;
    document.getElementById("income").innerText = income();
    document.getElementById("level").innerText = game.level;

    scheduleSave();
}

// BUILDINGS
function buildHouse() {
    if (game.money >= 100) {
        game.money -= 100;
        game.people += 10;
        update();
    }
}

function buildFactory() {
    if (game.money >= 300) {
        game.money -= 300;
        game.happiness -= 5;
        update();
    }
}

function buildSchool() {
    if (game.money >= 200) {
        game.money -= 200;
        game.happiness += 10;
        update();
    }
}

// GAME LOOP
setInterval(() => {
    game.money += income();
    update();
}, 3000);

// START
loadGame();

// expose
window.buildHouse = buildHouse;
window.buildFactory = buildFactory;
window.buildSchool = buildSchool;

</script>

</body>
</html>
