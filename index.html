<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Game</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.container { padding:15px; }
.card { background:#fff; padding:15px; margin-bottom:10px; border-radius:12px; }
button { padding:10px; margin:5px 0; width:100%; }
</style>
</head>

<body>
<div class="container">

<h2>🏙️ City Game</h2>

<div class="card">
  💰 Деньги: <span id="money"></span><br>
  👥 Люди: <span id="people"></span><br>
  😊 Счастье: <span id="happy"></span>
</div>

<button onclick="build()">🏠 Построить дом</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDiESFdpgCfwaHPbn5DVvde82bmTUn_92A",
  authDomain: "game-124da.firebaseapp.com",
  projectId: "game-124da",
  storageBucket: "game-124da.firebasestorage.app",
  messagingSenderId: "323957265964",
  appId: "1:323957265964:web:2ef3e6dbaea06b0c12e389"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Telegram
const tg = window.Telegram?.WebApp;
tg?.ready?.();
tg?.expand?.();

// ===== USER ID FIX =====
function getUserId() {
    const user = tg?.initDataUnsafe?.user;

    if (user?.id) {
        return "tg_" + user.id;
    }

    return null;
}

let userId = getUserId();

if (!userId) {
    console.log("NO TELEGRAM USER → fallback mode");
    userId = "guest_" + Math.random().toString(36).slice(2,8);
}

console.log("USER ID FINAL:", userId);

// ===== GAME DATA =====
let game = {
    money: 500,
    people: 0,
    happiness: 50
};

// ===== LOAD =====
async function loadGame() {
    try {
        const ref = doc(db, "cities", userId);
        const snap = await getDoc(ref);

        if (snap.exists()) {
            game = snap.data();
        }

        update();
    } catch (e) {
        console.log("LOAD ERROR:", e);
    }
}

// ===== SAVE =====
async function saveGame() {
    try {
        const ref = doc(db, "cities", userId);
        await setDoc(ref, game);
        console.log("SAVED");
    } catch (e) {
        console.log("SAVE ERROR:", e);
    }
}

// debounce save
let saveTimeout;
function scheduleSave() {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(saveGame, 1000);
}

// ===== GAME LOGIC =====
function update() {
    document.getElementById("money").innerText = game.money;
    document.getElementById("people").innerText = game.people;
    document.getElementById("happy").innerText = game.happiness;

    scheduleSave();
}

function build() {
    game.money -= 100;
    game.people += 10;
    game.happiness += 2;

    update();
}

// ===== AUTO INCOME =====
setInterval(() => {
    game.money += game.people * 2;
    update();
}, 3000);

// ===== START =====
loadGame();

// expose
window.build = build;

</script>

</body>
</html>
